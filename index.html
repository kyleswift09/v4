            background: linear-gradient(to right,

        .slide-line { width: 50px; height: 3px; background: var(--accent); border-radius: 2px; }
        .carousel-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.8); backdrop-filter: blur(4px);
            border: 1px solid var(--border); color: var(--text); font-size: 1.2rem;
            cursor: pointer; z-index: 10; display: flex;
            align-items: center; justify-content: center; transition: 0.2s;

        .carousel-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .carousel-btn.prev { left: 14px; }
        .carousel-btn.next { right: 14px; }
        .carousel-dots {
            position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 10;
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #b8d9c2; cursor: pointer; transition: 0.2s;
        }
        .dot.active { background: var(--accent); width: 24px; border-radius: 6px; }

        .section { max-width: 1100px; margin: 0 auto; padding: 40px 5%; }

    <script>
        // 轮播逻辑
        (function() {
            const slides = document.querySelectorAll('.carousel-slide');
            const dots = document.querySelectorAll('.dot');
            let idx = 0, timer;
            function go(n) {
                slides.forEach(s => s.classList.remove('active'));
                dots.forEach(d => d.classList.remove('active'));
                idx = (n + slides.length) % slides.length;
                slides[idx].classList.add('active');
                dots[idx].classList.add('active');
            }
            function next() { go(idx+1); }
            function prev() { go(idx-1); }
            function play() { clearInterval(timer); timer = setInterval(next, 4500); }
            function stop() { clearInterval(timer); }
            document.querySelector('.carousel-btn.next').addEventListener('click',()=>{next();play();});
            document.querySelector('.carousel-btn.prev').addEventListener('click',()=>{prev();play();});
            dots.forEach(d => d.addEventListener('click',()=>{
                go(parseInt(d.dataset.index));
                play();
            }));
            const ct = document.querySelector('.carousel-container');
            ct.addEventListener('mouseenter', stop);
            ct.addEventListener('mouseleave', play);
            let tx = 0;
            ct.addEventListener('touchstart', e => { tx = e.changedTouches[0].screenX; stop(); }, {passive:true});
            ct.addEventListener('touchend', e => {
                if (e.changedTouches[0].screenX < tx-40) next();
                if (e.changedTouches[0].screenX > tx+40) prev();
                play();
            });
            play();
        })();
    </script>
